<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: Inter, sans-serif;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      textarea {
        width: 100%;
        height: 240px;
        box-sizing: border-box;
        padding: 8px;
        font-family: monospace;
        font-size: 12px;
        resize: vertical;
      }

      button {
        width: 100%;
        margin-top: 8px;
        padding: 10px 12px;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
      }

      button.primary {
        background: #18a0fb;
        color: white;
      }

      button.primary:hover {
        background: #0d8de3;
      }

      button.secondary {
        background: #f0f0f0;
        color: #333;
      }

      button.secondary:hover {
        background: #e4e4e4;
      }

      .description {
        margin-bottom: 8px;
        font-size: 12px;
        color: #666;
        line-height: 1.5;
      }

      .error {
        margin-top: 8px;
        color: #d92d20;
        font-size: 12px;
        white-space: pre-wrap;
      }

      .result {
        margin-top: 8px;
        font-size: 12px;
        color: #333;
        white-space: pre-wrap;
        line-height: 1.5;
      }
    </style>
  </head>

  <body>
    <h2>Content Injector</h2>

    <p class="description">
      JSON key-value를 입력합니다.<br />
      <strong>Apply</strong>: 레이어 이름(key)과 일치하는 Text Layer에 value를 채웁니다.<br />
      <strong>텍스트로 이름 지정</strong>: 레이어 텍스트(value)와 일치하는 Text Layer의 이름을 key로 바꿉니다.<br />
      <strong>텍스트 추출</strong>: JSON key에 해당하는 Text Layer 내용을 읽어 textarea에 반영합니다.
    </p>

    <textarea id="jsonInput" placeholder='{
  "profile.name": "김민찬",
  "profile.headline": "복잡한 도메인을 사용자 흐름으로 바꾸는 프론트엔드 개발자"
}'></textarea>

    <button id="applyButton" class="primary">Apply to Figma</button>
    <button id="extractButton" class="secondary">텍스트 추출</button>
    <button id="renameButton" class="secondary">텍스트로 이름 지정</button>

    <div id="errorMessage" class="error"></div>
    <div id="resultMessage" class="result"></div>

    <script>
      const textarea = document.getElementById('jsonInput');
      const applyButton = document.getElementById('applyButton');
      const extractButton = document.getElementById('extractButton');
      const renameButton = document.getElementById('renameButton');
      const errorMessage = document.getElementById('errorMessage');
      const resultMessage = document.getElementById('resultMessage');

      function clearMessages() {
        errorMessage.textContent = '';
        resultMessage.textContent = '';
      }

      function parseContentMap(rawValue) {
        const contentMap = JSON.parse(rawValue);

        if (typeof contentMap !== 'object' || contentMap === null || Array.isArray(contentMap)) {
          return { error: 'JSON은 key-value 객체여야 합니다.' };
        }

        for (const value of Object.values(contentMap)) {
          if (typeof value !== 'string') {
            return { error: '모든 값은 문자열이어야 합니다.' };
          }
        }

        return { contentMap };
      }

      function sendPluginMessage(type) {
        clearMessages();

        try {
          const parsed = parseContentMap(textarea.value);

          if (parsed.error) {
            errorMessage.textContent = parsed.error;
            return;
          }

          parent.postMessage(
            {
              pluginMessage: {
                type,
                payload: parsed.contentMap,
              },
            },
            '*'
          );
        } catch (error) {
          errorMessage.textContent = 'JSON 형식이 올바르지 않습니다.';
        }
      }

      applyButton.onclick = () => sendPluginMessage('APPLY_CONTENT');
      extractButton.onclick = () => sendPluginMessage('EXTRACT_CONTENT');
      renameButton.onclick = () => sendPluginMessage('RENAME_LAYERS');

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;

        if (!message) {
          return;
        }

        if (message.type === 'RESULT') {
          resultMessage.textContent = message.payload;
        }

        if (message.type === 'EXTRACT_RESULT') {
          textarea.value = JSON.stringify(message.payload.contentMap, null, 2);
          resultMessage.textContent = message.payload.summary;
        }
      };
    </script>
  </body>
</html>
