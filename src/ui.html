<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: Inter, sans-serif;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      textarea {
        width: 100%;
        height: 260px;
        box-sizing: border-box;
        padding: 8px;
        font-family: monospace;
        font-size: 12px;
        resize: vertical;
      }

      button {
        width: 100%;
        margin-top: 12px;
        padding: 10px 12px;
        border: none;
        border-radius: 6px;
        background: #18a0fb;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #0d8de3;
      }

      .description {
        margin-bottom: 8px;
        font-size: 12px;
        color: #666;
        line-height: 1.5;
      }

      .error {
        margin-top: 8px;
        color: #d92d20;
        font-size: 12px;
        white-space: pre-wrap;
      }

      .result {
        margin-top: 8px;
        font-size: 12px;
        color: #333;
        white-space: pre-wrap;
        line-height: 1.5;
      }
    </style>
  </head>

  <body>
    <h2>Content Injector</h2>

    <p class="description">
      JSON key와 같은 이름의 Figma Text Layer를 찾아 내용을 채웁니다.
    </p>

    <textarea id="jsonInput" placeholder='{
  "profile.name": "김민찬",
  "profile.headline": "복잡한 도메인을 사용자 흐름으로 바꾸는 프론트엔드 개발자"
}'></textarea>

    <button id="applyButton">Apply to Figma</button>

    <div id="errorMessage" class="error"></div>
    <div id="resultMessage" class="result"></div>

    <script>
      const textarea = document.getElementById('jsonInput');
      const button = document.getElementById('applyButton');
      const errorMessage = document.getElementById('errorMessage');
      const resultMessage = document.getElementById('resultMessage');

      button.onclick = () => {
        errorMessage.textContent = '';
        resultMessage.textContent = '';

        try {
          const contentMap = JSON.parse(textarea.value);

          if (typeof contentMap !== 'object' || contentMap === null || Array.isArray(contentMap)) {
            errorMessage.textContent = 'JSON은 key-value 객체여야 합니다.';
            return;
          }

          for (const value of Object.values(contentMap)) {
            if (typeof value !== 'string') {
              errorMessage.textContent = '모든 값은 문자열이어야 합니다.';
              return;
            }
          }

          parent.postMessage(
            {
              pluginMessage: {
                type: 'APPLY_CONTENT',
                payload: contentMap
              }
            },
            '*'
          );
        } catch (error) {
          errorMessage.textContent = 'JSON 형식이 올바르지 않습니다.';
        }
      };

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;

        if (!message) {
          return;
        }

        if (message.type === 'RESULT') {
          resultMessage.textContent = message.payload;
        }
      };
    </script>
  </body>
</html>
